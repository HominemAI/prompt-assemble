name: Bump Version and Tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New version (e.g., 0.2.4)'
        required: true
        type: string

jobs:
  bump-version:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.DEPLOYBOTID }}
          private-key: ${{ secrets.DEPLOYBOTKEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure git
        run: |
          git config --local user.email "hominem-deploy[bot]@users.noreply.github.com"
          git config --local user.name "Hominem Deploy"

      - name: Validate version format
        run: |
          if ! [[ "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format. Expected: X.Y.Z (e.g., 0.2.4)"
            exit 1
          fi
          echo "Version format valid: ${{ inputs.version }}"

      - name: Update version files
        run: |
          python3 << 'EOF'
          import re

          # Update pyproject.toml
          with open('pyproject.toml', 'r') as f:
              content = f.read()
          content = re.sub(r'version = "[^"]*"', f'version = "${{ inputs.version }}"', content)
          with open('pyproject.toml', 'w') as f:
              f.write(content)
          print("Updated pyproject.toml")

          # Update __init__.py
          with open('src/prompt_assemble/__init__.py', 'r') as f:
              content = f.read()
          content = re.sub(r'__version__ = "[^"]*"', f'__version__ = "${{ inputs.version }}"', content)
          with open('src/prompt_assemble/__init__.py', 'w') as f:
              f.write(content)
          print("Updated __init__.py")

          # Update cli.py
          with open('src/prompt_assemble/cli.py', 'r') as f:
              content = f.read()
          content = re.sub(r"version='%(prog)s [^']*'", f"version='%(prog)s ${{ inputs.version }}'", content)
          with open('src/prompt_assemble/cli.py', 'w') as f:
              f.write(content)
          print("Updated cli.py")
          EOF

      - name: Verify changes
        run: |
          echo "=== pyproject.toml ==="
          grep "version = " pyproject.toml
          echo ""
          echo "=== __init__.py ==="
          grep "__version__" src/prompt_assemble/__init__.py
          echo ""
          echo "=== cli.py ==="
          grep "version='%(prog)s" src/prompt_assemble/cli.py

      - name: Commit version bump
        run: |
          git add pyproject.toml src/prompt_assemble/__init__.py src/prompt_assemble/cli.py
          git commit -m "Version Bump ${{ inputs.version }}"

      - name: Create and push tag
        run: |
          git tag "v${{ inputs.version }}"
          git push origin main --follow-tags
          echo "Created and pushed tag: v${{ inputs.version }}"
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          token: ${{ steps.app-token.outputs.token }}
          tag_name: v${{ inputs.version }}
          body: |
            # Version ${{ inputs.version }}

            Automated version bump and release.

            Docker images will be built automatically:
            - Backend only: `ghcr.io/${{ github.repository }}:${{ inputs.version }}`
            - With UI: `ghcr.io/${{ github.repository }}-with-ui:${{ inputs.version }}`

            PyPI package will be available at: https://pypi.org/project/prompt-assemble/${{ inputs.version }}/
